<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div id="app"></div>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>

  <!-- Components -->
  <script src="components/Home.js"></script>
  <script src="components/Login.js"></script>
  <script src="components/Dashboard.js"></script>
  <script src="components/Items.js"></script>
  <script src="components/Categories.js"></script>
  <script src="components/Suppliers.js"></script>
  <script src="components/StockHistory.js"></script>

  <script>
    const BASE_URL = 'http://localhost/backend-api/public/api';

    // ===== AXIOS INTERCEPTORS =====
    axios.interceptors.request.use(config => {
      const token = localStorage.getItem('token');
      if (token) {
        config.headers.Authorization = `Bearer ${token}`;
      }
      return config;
    });

    axios.interceptors.response.use(
      response => response,
      error => {
        if (error.response && error.response.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('isLoggedIn');
          localStorage.removeItem('user');
          alert('Sesi habis! Silakan login kembali.');
          router.push('/login');
        }
        return Promise.reject(error);
      }
    );

    // ===== ROUTES =====
    const routes = [
      { path: '/',              component: Home },
      { path: '/login',         component: Login },
      {
        path: '/dashboard',
        component: Dashboard,
        meta: { requiresAuth: true }
      },
      {
        path: '/items',
        component: Items,
        meta: { requiresAuth: true }
      },
      {
        path: '/categories',
        component: Categories,
        meta: { requiresAuth: true }
      },
      {
        path: '/suppliers',
        component: Suppliers,
        meta: { requiresAuth: true }
      },
      {
        path: '/stock-history',
        component: StockHistory,
        meta: { requiresAuth: true }
      },
    ];

    const router = VueRouter.createRouter({
      history: VueRouter.createWebHashHistory(),
      routes
    });

    // ===== NAVIGATION GUARD =====
    router.beforeEach((to, from, next) => {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      if (to.meta.requiresAuth && !isLoggedIn) {
        next('/login');
      } else {
        next();
      }
    });

    // ===== APP =====
    const app = Vue.createApp({
      template: `<router-view></router-view>`
    });

    app.use(router);
    app.mount('#app');
  </script>

</body>
</html>
